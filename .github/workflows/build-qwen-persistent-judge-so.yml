name: Stage 6M-S Qwen native semantic route scorer build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-arm64:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build git build-essential

      - name: Install Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d
          add-to-path: false

      - name: Clone llama.cpp
        run: |
          rm -rf llama.cpp
          git clone --depth 1 https://github.com/ggerganov/llama.cpp.git llama.cpp

      - name: Configure llama.cpp minimal Android shared libs
        run: |
          cmake -S llama.cpp -B llama-build -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE="$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-26 \
            -DANDROID_STL=c++_shared \
            -DBUILD_SHARED_LIBS=ON \
            -DGGML_NATIVE=OFF \
            -DGGML_OPENMP=OFF \
            -DGGML_BLAS=OFF \
            -DGGML_CUDA=OFF \
            -DGGML_METAL=OFF \
            -DGGML_VULKAN=OFF \
            -DLLAMA_BUILD_TESTS=OFF \
            -DLLAMA_BUILD_EXAMPLES=OFF \
            -DLLAMA_BUILD_SERVER=OFF \
            -DLLAMA_BUILD_TOOLS=OFF

      - name: Build only required llama shared libraries
        run: |
          cmake --build llama-build --target ggml ggml-base ggml-cpu llama -j2

      - name: Build libnahid_qwen_judge.so
        run: |
          mkdir -p out/arm64-v8a
          TOOLCHAIN="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64"
          CXX="$TOOLCHAIN/bin/aarch64-linux-android26-clang++"
          INCLUDES="-Illama.cpp/include -Illama.cpp/ggml/include -Illama.cpp/src -Illama.cpp/ggml/src"
          LIBDIR="-L$(pwd)/llama-build/bin -L$(pwd)/llama-build/src -L$(pwd)/llama-build/ggml/src -L$(pwd)/llama-build/ggml/src/ggml-cpu -L$(pwd)/llama-build/ggml/src/ggml-base"
          $CXX -shared -fPIC -O2 -std=c++17 \
            $INCLUDES \
            native/qwen_judge/nahid_qwen_judge.cpp \
            $LIBDIR \
            -Wl,-rpath,'$ORIGIN' \
            -lllama -lggml -lggml-base -lggml-cpu -llog -landroid \
            -o out/arm64-v8a/libnahid_qwen_judge.so

      - name: Package shared libraries including libc++ runtime
        run: |
          mkdir -p out/arm64-v8a
          find llama-build -name 'libggml.so' -exec cp -v {} out/arm64-v8a/ \;
          find llama-build -name 'libggml-base.so' -exec cp -v {} out/arm64-v8a/ \;
          find llama-build -name 'libggml-cpu.so' -exec cp -v {} out/arm64-v8a/ \;
          find llama-build -name 'libllama.so' -exec cp -v {} out/arm64-v8a/ \;
          # This is critical. The persistent judge .so depends on the Android C++ shared runtime.
          cp -v "$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr/lib/aarch64-linux-android/libc++_shared.so" out/arm64-v8a/
          ls -la out/arm64-v8a
          (cd out && zip -r ../libnahid_qwen_judge_stage6M_S_semantic_route_scorer_arm64_v8a.zip arm64-v8a)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: libnahid_qwen_judge_stage6M_S_semantic_route_scorer_arm64_v8a
          path: libnahid_qwen_judge_stage6M_S_semantic_route_scorer_arm64_v8a.zip
